<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PulseTap</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <!-- TITLE -->
    <h1>PulseTap</h1>
    <p class="subtitle">Test your reflexes. Beat yourself.</p>

    <!-- XP SYSTEM -->
    <div class="xp-container">
      <p>⭐ Level <span id="level">1</span></p>

      <div class="xp-bar-bg">
        <div id="xpBar" class="xp-bar"></div>
      </div>

      <p id="xpText">0 / 100 XP</p>
    </div>

    <!-- GAME AREA -->
    <div id="gameBox" class="box waiting">
      <p id="message">Click Start</p>
    </div>

    <!-- MAIN CONTROLS -->
    <div class="controls">
      <button id="startBtn">Start</button>
      <button id="resetStats">Reset Stats</button>
      <button id="themeBtn">🎨 Theme</button>
    </div>

    <!-- STATS -->
    <div class="stats">
      <p>⏱ Your Time: <span id="time">--</span> ms</p>
      <p>🏆 Best: <span id="best">--</span> ms</p>
      <p>📊 Average: <span id="average">--</span> ms</p>
      <p>🎯 Attempts: <span id="attempts">0</span></p>
    </div>

    <!-- RESULT CARD -->
    <div class="result-card">
      <h2 id="reactionResult">--</h2>
      <p id="rankResult">Start playing</p>
    </div>

    <!-- STREAK -->
    <div class="streak">
      <p>⚡ Streak: <span id="streakCount">0</span></p>
      <p id="streakMsg">Start playing...</p>
    </div>

    <!-- RECENT HISTORY -->
    <div class="history">
      <h3>📊 Recent Attempts</h3>
      <div id="historyList"></div>
    </div>

    <!-- ACHIEVEMENTS -->
    <div class="achievement-section">
      <h3>🏆 Achievements</h3>
      <div id="achievements"></div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
